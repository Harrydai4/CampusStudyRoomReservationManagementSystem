spring.application.name=CampusStudyRoomReservationManagementSystem
server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/study_room_reservation?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=never
spring.jackson.time-zone=Asia/Shanghai
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

app.jwt.secret=${JWT_SECRET:campus-study-room-reservation-management-system-dev-secret}
app.jwt.expire-hours=${JWT_EXPIRE_HOURS:24}
