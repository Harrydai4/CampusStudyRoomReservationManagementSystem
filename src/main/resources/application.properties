spring.application.name=CampusStudyRoomReservationManagementSystem

# 自动加载本机/共用配置（均在 .gitignore，不会提交密码）
spring.config.import=optional:classpath:application-local.properties,optional:classpath:application-shared.properties

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/study_room_reservation?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# 多人共用时可适当加大连接池（亦可在 application-shared.properties 覆盖）
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:15}
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=30000

# 局域网演示：0.0.0.0 允许同 WiFi 设备访问（环境变量 SERVER_ADDRESS 可覆盖）
server.address=${SERVER_ADDRESS:0.0.0.0}
server.port=${SERVER_PORT:8080}
# 经 Cloudflare/ngrok 等 HTTPS 隧道反代时需识别 X-Forwarded-* 头
server.forward-headers-strategy=framework

spring.sql.init.mode=never
spring.jackson.time-zone=Asia/Shanghai
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

app.jwt.secret=${JWT_SECRET:campus-study-room-reservation-management-system-dev-secret}
app.jwt.expire-hours=${JWT_EXPIRE_HOURS:24}

# 上传目录：默认项目根目录/uploads（绝对路径，避免 Tomcat 临时目录导致上传失败）
app.upload.dir=${UPLOAD_DIR:${user.dir}/uploads}

# 启动时恢复演示账号默认密码（学号 123456 / 管理员 admin123），避免本地测试改密后无法登录
app.demo.sync-accounts-on-startup=${DEMO_SYNC_ACCOUNTS:true}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
